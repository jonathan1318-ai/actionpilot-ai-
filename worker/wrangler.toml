name = "actionpilot-ai-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
# Comma-separated list of origins allowed to call this Worker.
# Add your real production domain here once you know it (e.g. after the
# first `firebase deploy --only hosting`), separated by a comma.
ALLOWED_ORIGINS = "http://localhost:5173,https://actionpilot-ai-ef0f7.web.app,https://actionpilot-ai-ef0f7.firebaseapp.com"

[ai]
binding = "AI"

# Workers AI runs on your free Cloudflare account - no API key, no billing,
# no credit card required.
