name = "actionpilot-ai-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"

[ai]
binding = "AI"

# Workers AI runs on your free Cloudflare account - no API key, no billing,
# no credit card required. Update ALLOWED_ORIGIN to your deployed app's
# origin before going to production.
